<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clean Larp Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0d14;
            --card-bg: #141823;
            --text-main: #ffffff;
            --text-muted: #8e93a6;
            --accent: #6366f1;
            --positive: #10b981;
            --negative: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(99, 102, 241, 0.08) 0%, transparent 60%);
        }

        .container {
            padding: 24px;
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            padding: 40px 0 35px;
            text-align: center;
        }

        .balance-label {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .total-balance {
            font-size: 48px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
            margin-bottom: 12px;
            letter-spacing: -1px;
        }

        .currency-symbol {
            color: var(--text-muted);
            font-size: 32px;
            font-weight: 500;
        }

        .portfolio-change {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 15px;
            font-weight: 500;
            padding: 6px 14px;
            border-radius: 20px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--positive);
        }

        .portfolio-change.down {
            background: rgba(239, 68, 68, 0.1);
            color: var(--negative);
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-bottom: 40px;
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .btn-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: var(--text-main);
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .btn:active .btn-icon {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-icon.send { color: #6366f1; }
        .btn-icon.receive { color: #10b981; }
        .btn-icon.swap { color: #f59e0b; }

        .btn span {
            font-size: 14px;
            font-weight: 500;
        }

        .assets-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
        }

        .assets-title {
            font-size: 20px;
            font-weight: 600;
        }

        .assets-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-bottom: 40px;
        }

        .asset-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .asset-card:active {
            transform: scale(0.97);
            opacity: 0.9;
        }

        .asset-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .asset-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .asset-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .asset-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .asset-name {
            font-size: 16px;
            font-weight: 600;
        }

        .asset-price-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .asset-price {
            color: var(--text-muted);
            font-size: 14px;
        }

        .asset-change {
            font-size: 13px;
            font-weight: 500;
        }
        
        .change-up { color: var(--positive); }
        .change-down { color: var(--negative); }

        .asset-balance {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .balance-fiat {
            font-size: 16px;
            font-weight: 600;
        }

        .balance-crypto {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #141823;
            width: 100%;
            border-radius: 28px 28px 0 0;
            padding: 30px 24px 40px;
            transform: translateY(100%);
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.05);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .close-modal {
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-muted);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .close-modal:active {
            background: rgba(255,255,255,0.1);
        }

        .input-group {
            margin-bottom: 24px;
        }

        .input-label {
            display: block;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-size: 14px;
            font-weight: 500;
        }

        .amount-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 18px;
            color: white;
            font-size: 24px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        .amount-input:focus {
            border-color: var(--accent);
        }

        .save-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
        }

        .save-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        /* Subtle pulse for price changes */
        @keyframes pulse-green-clean {
            0% { color: var(--text-main); }
            50% { color: var(--positive); }
            100% { color: var(--text-main); }
        }

        @keyframes pulse-red-clean {
            0% { color: var(--text-main); }
            50% { color: var(--negative); }
            100% { color: var(--text-main); }
        }

        .price-up { animation: pulse-green-clean 1.5s ease; }
        .price-down { animation: pulse-red-clean 1.5s ease; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="balance-label">Total Portfolio</div>
        <div class="total-balance">
            <span class="currency-symbol">$</span>
            <span id="total-value">0.00</span>
        </div>
        <div class="portfolio-change" id="total-change">
            <i class="fas fa-arrow-up" style="font-size: 12px;"></i>
            <span>0.00%</span>
        </div>
    </header>

    <div class="action-buttons">
        <div class="btn">
            <div class="btn-icon send"><i class="fas fa-arrow-up"></i></div>
            <span>Send</span>
        </div>
        <div class="btn">
            <div class="btn-icon receive"><i class="fas fa-arrow-down"></i></div>
            <span>Receive</span>
        </div>
        <div class="btn">
            <div class="btn-icon swap"><i class="fas fa-exchange-alt"></i></div>
            <span>Swap</span>
        </div>
    </div>

    <div class="assets-header">
        <div class="assets-title">Assets</div>
        <i class="fas fa-sliders-h" style="color: var(--text-muted); cursor: pointer; padding: 5px;"></i>
    </div>

    <div class="assets-list" id="assets-list">
        <!-- Asset Cards will be injected here via JS -->
    </div>
</div>

<!-- Edit Balance Modal -->
<div class="modal-overlay" id="edit-modal">
    <div class="modal-content">
        <div class="modal-header">
            <div class="modal-title" id="modal-title">
                <img src="" id="modal-icon" style="width: 24px; height: 24px; border-radius: 50%; object-fit: contain;">
                Edit <span id="modal-coin-name">Bitcoin</span>
            </div>
            <button class="close-modal" id="close-modal"><i class="fas fa-times"></i></button>
        </div>
        
        <div class="input-group">
            <label class="input-label">Amount Owned (<span id="modal-symbol">BTC</span>)</label>
            <input type="number" id="balance-input" class="amount-input" step="any" placeholder="0.00">
        </div>
        
        <button class="save-btn" id="save-balance">Save Holdings</button>
    </div>
</div>

<script>
    const defaultHoldings = {
        'BTC': 2.45,
        'ETH': 18.2,
        'SOL': 245.5,
        'BNB': 52.0,
        'XRP': 15000.0,
        'DOGE': 420000.0
    };

    let holdings = JSON.parse(localStorage.getItem('larp_holdings')) || defaultHoldings;

    const coins = [
        { symbol: 'BTC', name: 'Bitcoin', binanceSymbol: 'btcusdt', icon: 'https://cryptologos.cc/logos/bitcoin-btc-logo.png' },
        { symbol: 'ETH', name: 'Ethereum', binanceSymbol: 'ethusdt', icon: 'https://cryptologos.cc/logos/ethereum-eth-logo.png' },
        { symbol: 'SOL', name: 'Solana', binanceSymbol: 'solusdt', icon: 'https://cryptologos.cc/logos/solana-sol-logo.png' },
        { symbol: 'BNB', name: 'BNB', binanceSymbol: 'bnbusdt', icon: 'https://cryptologos.cc/logos/bnb-bnb-logo.png' },
        { symbol: 'XRP', name: 'XRP', binanceSymbol: 'xrpusdt', icon: 'https://cryptologos.cc/logos/xrp-xrp-logo.png' },
        { symbol: 'DOGE', name: 'Dogecoin', binanceSymbol: 'dogeusdt', icon: 'https://cryptologos.cc/logos/dogecoin-doge-logo.png' }
    ];

    let prices = {};
    let previousPrices = {};
    let latestTickData = {}; // Stores incoming WS ticks
    let currentEditSymbol = null;

    // DOM Elements
    const assetsList = document.getElementById('assets-list');
    const totalValueEl = document.getElementById('total-value');
    const totalChangeEl = document.getElementById('total-change');
    const modalOverlay = document.getElementById('edit-modal');
    const closeModalBtn = document.getElementById('close-modal');
    const saveBalanceBtn = document.getElementById('save-balance');
    const balanceInput = document.getElementById('balance-input');

    function initUI() {
        assetsList.innerHTML = '';
        coins.forEach(coin => {
            prices[coin.symbol] = { price: 0, change: 0 };
            
            const card = document.createElement('div');
            card.className = 'asset-card';
            card.id = `card-${coin.symbol}`;
            card.onclick = () => openEditModal(coin.symbol);
            
            card.innerHTML = `
                <div class="asset-info">
                    <div class="asset-icon">
                        <img src="${coin.icon}" alt="${coin.name}">
                    </div>
                    <div class="asset-details">
                        <div class="asset-name">${coin.name}</div>
                        <div class="asset-price-row">
                            <span class="asset-price" id="price-${coin.symbol}">$0.00</span>
                            <span class="asset-change" id="change-${coin.symbol}">0.00%</span>
                        </div>
                    </div>
                </div>
                <div class="asset-balance">
                    <div class="balance-fiat" id="value-${coin.symbol}">$0.00</div>
                    <div class="balance-crypto">
                        <span id="amount-${coin.symbol}">${formatCrypto(holdings[coin.symbol])}</span> ${coin.symbol}
                    </div>
                </div>
            `;
            assetsList.appendChild(card);
        });

        setupWebSocket();
        startThrottledUpdates();
    }

    function setupWebSocket() {
        const streams = coins.map(c => c.binanceSymbol + '@ticker').join('/');
        const ws = new WebSocket(`wss://stream.binance.com:9443/ws/${streams}`);

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const coin = coins.find(c => c.binanceSymbol === data.s.toLowerCase());
            
            if (coin) {
                // Store the tick data but don't update UI yet
                latestTickData[coin.symbol] = {
                    price: parseFloat(data.c),
                    change: parseFloat(data.P)
                };
            }
        };

        ws.onerror = () => {
            console.error("WebSocket Error, falling back to REST");
            fetchPricesREST();
            setInterval(fetchPricesREST, 6000);
        };
    }

    // Flush updates to UI every 5.5 seconds
    function startThrottledUpdates() {
        setInterval(() => {
            let uiNeedsUpdate = false;
            
            Object.keys(latestTickData).forEach(symbol => {
                const latest = latestTickData[symbol];
                // Only update if price actually changed
                if (!prices[symbol] || prices[symbol].price !== latest.price) {
                    previousPrices[symbol] = prices[symbol].price;
                    prices[symbol] = { price: latest.price, change: latest.change };
                    updateCoinUI(symbol);
                    uiNeedsUpdate = true;
                }
            });

            if (uiNeedsUpdate) {
                updateTotalPortfolio();
            }
        }, 5500); // 5.5s delay for cleaner updates
    }

    async function fetchPricesREST() {
        try {
            const symbols = coins.map(c => c.symbol).join(',');
            const response = await fetch(`https://min-api.cryptocompare.com/data/pricemultifull?fsyms=${symbols}&tsyms=USD`);
            const data = await response.json();
            
            let uiNeedsUpdate = false;
            coins.forEach(coin => {
                if (data.RAW && data.RAW[coin.symbol] && data.RAW[coin.symbol].USD) {
                    const info = data.RAW[coin.symbol].USD;
                    latestTickData[coin.symbol] = {
                        price: info.PRICE,
                        change: info.CHANGEPCT24HOUR
                    };
                }
            });
        } catch (e) {
            console.error("Failed to fetch prices REST", e);
        }
    }

    function updateCoinUI(symbol) {
        const price = prices[symbol].price;
        const change = prices[symbol].change;
        const amount = holdings[symbol] || 0;
        const value = price * amount;

        const priceEl = document.getElementById(`price-${symbol}`);
        const changeEl = document.getElementById(`change-${symbol}`);
        const valueEl = document.getElementById(`value-${symbol}`);
        const amountEl = document.getElementById(`amount-${symbol}`);

        const prevPrice = previousPrices[symbol];
        if (prevPrice && price !== prevPrice) {
            priceEl.classList.remove('price-up', 'price-down');
            void priceEl.offsetWidth; // trigger reflow
            if (price > prevPrice) {
                priceEl.classList.add('price-up');
            } else {
                priceEl.classList.add('price-down');
            }
        }

        priceEl.innerText = formatCurrency(price);
        valueEl.innerText = formatCurrency(value);
        amountEl.innerText = formatCrypto(amount);

        changeEl.innerText = `${change >= 0 ? '+' : ''}${change.toFixed(2)}%`;
        changeEl.className = `asset-change ${change >= 0 ? 'change-up' : 'change-down'}`;
    }

    function updateTotalPortfolio() {
        let totalValue = 0;
        let previousTotalValue = 0; 

        coins.forEach(coin => {
            const amount = holdings[coin.symbol] || 0;
            const price = prices[coin.symbol].price || 0;
            const changePercent = prices[coin.symbol].change || 0;
            
            const currentCoinValue = amount * price;
            totalValue += currentCoinValue;
            
            const pastCoinValue = currentCoinValue / (1 + (changePercent / 100));
            previousTotalValue += pastCoinValue;
        });

        animateValue(totalValueEl, parseFloat(totalValueEl.innerText.replace(/,/g, '')) || 0, totalValue, 800);
        
        if (previousTotalValue > 0) {
            const totalChangePercent = ((totalValue - previousTotalValue) / previousTotalValue) * 100;
            const isPositive = totalChangePercent >= 0;
            
            totalChangeEl.className = `portfolio-change ${isPositive ? '' : 'down'}`;
            totalChangeEl.innerHTML = `
                <i class="fas fa-arrow-${isPositive ? 'up' : 'down'}" style="font-size: 11px;"></i>
                <span>${Math.abs(totalChangePercent).toFixed(2)}%</span>
            `;
        }
    }

    function openEditModal(symbol) {
        currentEditSymbol = symbol;
        const coin = coins.find(c => c.symbol === symbol);
        
        document.getElementById('modal-coin-name').innerText = coin.name;
        document.getElementById('modal-symbol').innerText = symbol;
        document.getElementById('modal-icon').src = coin.icon;
        
        balanceInput.value = holdings[symbol] || 0;
        
        modalOverlay.classList.add('active');
        balanceInput.focus();
    }

    function closeModal() {
        modalOverlay.classList.remove('active');
        setTimeout(() => { currentEditSymbol = null; }, 300);
    }

    function saveBalance() {
        if (currentEditSymbol) {
            const newBalance = parseFloat(balanceInput.value);
            if (!isNaN(newBalance) && newBalance >= 0) {
                holdings[currentEditSymbol] = newBalance;
                localStorage.setItem('larp_holdings', JSON.stringify(holdings));
                
                // Immediately apply change to this coin for responsiveness
                if(prices[currentEditSymbol].price > 0) {
                    updateCoinUI(currentEditSymbol);
                    updateTotalPortfolio();
                }
                closeModal();
            }
        }
    }

    closeModalBtn.addEventListener('click', closeModal);
    saveBalanceBtn.addEventListener('click', saveBalance);
    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) closeModal();
    });
    
    balanceInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') saveBalance();
    });

    function formatCurrency(value) {
        if (value >= 1000) {
            return '$' + value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        } else if (value >= 1) {
            return '$' + value.toFixed(2);
        } else {
            return '$' + value.toFixed(4);
        }
    }

    function formatCrypto(value) {
        if (value >= 1000) {
            return value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
        } else if (value >= 1) {
            return value.toFixed(4);
        } else if (value > 0) {
            return value.toFixed(6);
        } else {
            return '0';
        }
    }
    
    function animateValue(obj, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            // Ease out cubic
            const easeProgress = 1 - Math.pow(1 - progress, 3);
            const current = start + easeProgress * (end - start);
            obj.innerHTML = current.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            if (progress < 1) {
                window.requestAnimationFrame(step);
            }
        };
        window.requestAnimationFrame(step);
    }

    initUI();
</script>
</body>
</html>
